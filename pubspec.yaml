name: durahim_website
description: Professional AI and Quantum Computing Portfolio.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management (Professional Standard)
  flutter_riverpod: ^2.4.0
  
  # Backend & Database (Keep these; they won't break anything if not initialized)
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  
  # UI & Visuals
  google_fonts: ^6.1.0
  rive: ^0.12.3 # For Quantum/AI animations
  font_awesome_flutter: ^10.6.0
  flutter_svg: ^2.0.9
  
  # Professional Guardrails
  seo_renderer: ^0.6.0 # Crucial for Google to find your site
  url_launcher: ^6.2.2 
  responsive_framework: ^1.1.1 # Ensures it works on 4K monitors & Phones

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Standard for professional code quality

flutter:
  uses-material-design: true
  
  # Ensure you create these folders in your root directory
  assets:
    - assets/images/
    - assets/animations/